<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>perfwire — perfboard wiring planner</title>
<style>
:root{--bg:#15181c;--panel:#1d2228;--panel2:#232a31;--bd:#313a43;--tx:#d9e0e7;--mut:#8b97a3;--acc:#41c7ff;--acc2:#0e9fd8;--ok:#3ddc84;--ng:#ff5d5d;--wr:#ffb454}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--tx);font:14px/1.6 "Segoe UI",system-ui,sans-serif;display:flex;flex-direction:column}
header{display:flex;gap:10px;align-items:center;padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--bd);flex-wrap:wrap}
.brand{font:700 17px/1 Consolas,monospace;color:var(--acc);letter-spacing:1px}
.brand small{color:var(--mut);font-weight:400;margin-left:6px}
.spacer{flex:1}
button{background:var(--panel2);color:var(--tx);border:1px solid var(--bd);border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer}
button:hover{border-color:var(--acc2);color:#fff}
button.primary{background:var(--acc2);border-color:var(--acc2);color:#04222e;font-weight:600}
button.primary:hover{background:var(--acc)}
button.seg{border-radius:0;border-right-width:0;padding:6px 10px}
.seggrp{display:inline-flex;border-radius:6px;overflow:hidden;border:1px solid var(--bd)}
.seggrp button{border:0;border-right:1px solid var(--bd)}
.seggrp button:last-child{border-right:0}
.seggrp button.on{background:var(--acc2);color:#04222e;font-weight:600}
select{background:var(--panel2);color:var(--tx);border:1px solid var(--bd);border-radius:6px;padding:6px 8px;font-size:13px;max-width:280px}
.layout{display:flex;flex:1;min-height:0}
aside{width:300px;min-width:300px;background:var(--panel);border-right:1px solid var(--bd);overflow-y:auto;padding:10px 12px}
aside h4{margin:14px 0 6px;font-size:11px;letter-spacing:1.5px;color:var(--mut);text-transform:uppercase}
aside h4:first-child{margin-top:2px}
main{flex:1;display:flex;flex-direction:column;min-width:0}
#canvas{flex:1;overflow:auto;position:relative;background:radial-gradient(ellipse at 30% 20%, #1a1f25 0%, #15181c 70%)}
#ztools{position:absolute;top:10px;right:14px;display:flex;gap:6px;z-index:5}
#status{padding:5px 14px;background:var(--panel);border-top:1px solid var(--bd);font:12px Consolas,monospace;color:var(--mut);display:flex;gap:18px;flex-wrap:wrap}
#status b{color:var(--tx);font-weight:600}
.tgl{display:flex;align-items:center;gap:8px;font-size:13px;margin:3px 0}
.tgl input{accent-color:var(--acc2);width:15px;height:15px}
.sld{display:grid;grid-template-columns:1fr 44px;gap:8px;align-items:center;font-size:12px;margin:6px 0 2px}
.sld .lab{grid-column:1/3;color:var(--mut);font-size:12px;margin-bottom:-4px}
.sld input[type=range]{width:100%;accent-color:var(--acc2)}
.sld .val{font:12px Consolas,monospace;color:var(--acc);text-align:right}
details{border:1px solid var(--bd);border-radius:8px;padding:6px 10px;margin:6px 0;background:var(--panel2)}
summary{cursor:pointer;font-size:13px;font-weight:600;color:var(--tx)}
#audit{font-size:12.5px;line-height:1.8;background:var(--panel2);border:1px solid var(--bd);border-radius:8px;padding:8px 10px}
.ok{color:var(--ok)}.ng{color:var(--ng);font-weight:700}.wr{color:var(--wr)}
textarea{width:100%;height:64px;background:#11151a;color:var(--tx);border:1px solid var(--bd);border-radius:6px;font:11px Consolas,monospace;padding:6px}
.hint{font-size:11.5px;color:var(--mut);line-height:1.5;margin:4px 0}
svg{display:block;margin:14px auto}
.drop{outline:2px dashed var(--acc);outline-offset:-8px}
</style>
</head>
<body>
<header>
<span class="brand">perfwire<small>v0.1 — perfboard wiring planner</small></span>
<select id="pw-prop"></select>
<button id="pw-rewire" class="primary">配線を再計算</button>
<button id="pw-repropose" class="primary">配置を再提案</button>
<button id="pw-saveas">案として保存</button>
<span class="spacer"></span>
<button id="pw-undo" title="Ctrl+Z">元に戻す</button>
<button id="pw-open">開く…</button>
<button id="pw-export">書き出し</button>
</header>
<div class="layout">
<aside>
<h4>モード <span style="color:var(--mut);text-transform:none;letter-spacing:0">(1-4キー)</span></h4>
<div class="seggrp">
<button id="m-end">端子</button><button id="m-part">部品</button><button id="m-bridge">ブリッジ</button><button id="m-block">穴×</button>
</div>
<div class="hint" id="modehint"></div>
<div style="margin:6px 0"><button id="pw-lock">選択部品のロック切替</button> <button id="pw-reset">案をリセット</button></div>
<h4>レイヤー</h4>
<div id="layers"></div>
<h4>しきい値</h4>
<details open><summary>最適化の重み</summary><div id="s-weights"></div></details>
<details><summary>部品の物理寸法</summary><div id="s-phys"></div></details>
<details><summary>EE 制約</summary><div id="s-ee"></div></details>
<div style="margin:4px 0"><button id="pw-defcfg">設定を既定値に戻す</button></div>
<h4>監査</h4>
<div id="audit">まだ計算していません</div>
<h4>データ</h4>
<div class="hint">JSONの貼り付け→インポート、またはファイルをこの画面にドロップ。編集・設定は自動保存。</div>
<textarea id="pw-out" placeholder="エクスポート/インポート用JSON"></textarea>
<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">
<button id="pw-copy">コピー</button><button id="pw-import">インポート</button><button id="pw-sample">サンプル復元</button><button id="pw-clearls">保存データ消去</button>
</div>
</aside>
<main>
<div id="canvas">
<div id="ztools"><button id="z-out">−</button><button id="z-fit">100%</button><button id="z-in">＋</button></div>
<svg id="pw-svg" style="touch-action:none"></svg>
</div>
<footer id="status"><span id="st-pos">—</span><span id="st-net"></span><span id="st-stats"></span></footer>
</main>
</div>
<input type="file" id="pw-file" accept=".json" hidden>

if(e.bridgeTo&&adj(e.hole,e.bridgeTo)){for(i=0;i<ns.length;i++)if(ns[i][0]===e.bridgeTo[0]&&ns[i][1]===e.bridgeTo[1]){ok=true;break;}}
if(!ok){var best=null;ns.forEach(function(n){if(adj(e.hole,n)){var d2=Math.hypot(n[0]-e.pad[0],n[1]-e.pad[1]);if(!best||d2<best[0])best=[d2,n];}});e.bridgeTo=best?deep(best[1]):null;}}
function afterMove(p){var names={};partLeads(p).forEach(function(L){names[L.name]=L.pos;if(D.leads[L.name])D.leads[L.name].at=deep(L.pos);});
D.wires.forEach(function(w){[w.a,w.b].forEach(function(e){if(names[e.tap])e.pad=deep(names[e.tap]);revalidate(e,w);});});}
function snap(){undoStack.push({i:curI,s:deep(D)});if(undoStack.length>40)undoStack.shift();}
function undo(){var u=undoStack.pop();if(!u)return;curI=u.i;props[curI].cur=u.s;document.getElementById('pw-prop').value=curI;loadProp(curI);auditNow();}
svg.addEventListener('pointerdown',function(ev){ev.preventDefault();var pt=getPt(ev),i,j;
if(mode==='bridge'){for(i=0;i<D.padBridges.length;i++){var b=D.padBridges[i];if(b._px&&segd(pt[0],pt[1],b._px[0][0],b._px[0][1],b._px[1][0],b._px[1][1])<8){snap();D.padBridges.splice(i,1);render();return;}}
var h=nearHole(pt[0],pt[1]);if(h)drag={t:'bridge',a:h,cur:pt};return;}
if(mode==='block'){var h2=nearHole(pt[0],pt[1]);if(h2){if(occupiedOther(h2[0],h2[1],null,null))return;snap();var bi=blockedIdx(h2[0],h2[1]);if(bi>=0)D.blockedHoles.splice(bi,1);else D.blockedHoles.push([h2[0],h2[1]]);render();}return;}
if(mode==='end'){for(j=0;j<D.wires.length;j++){var w=D.wires[j],es=[w.a,w.b];for(var k2=0;k2<2;k2++){var e=es[k2];if(e._px&&Math.hypot(pt[0]-e._px[0],pt[1]-e._px[1])<13){drag={t:'end',e:e,w:w,prev:deep({hole:e.hole,direct:e.direct,bridgeTo:e.bridgeTo||null})};return;}}}return;}
for(i=D.parts.length-1;i>=0;i--){var p=D.parts[i],Ls=partLeads(p);for(j=0;j<Ls.length;j++){var v=xy(Ls[j].pos[0],Ls[j].pos[1]);if(Math.hypot(pt[0]-v[0],pt[1]-v[1])<11){selPart=p;if(!p.locked&&p.kind!=='ic')drag={t:'plead',p:p,L:Ls[j],prev:deep(Ls[j].pos)};render();return;}}}
for(i=0;i<D.parts.length;i++){var p2=D.parts[i];if(p2._body&&pt[0]>=p2._body[0]&&pt[0]<=p2._body[0]+p2._body[2]&&pt[1]>=p2._body[1]&&pt[1]<=p2._body[1]+p2._body[3]){selPart=p2;if(!p2.locked)drag={t:'pmove',p:p2,g0:[(pt[0]-OX)/PITCH+1,(pt[1]-OY)/PITCH+1],orig:partLeads(p2).map(function(L){return deep(L.pos);})};render();return;}}
for(i=D.parts.length-1;i>=0;i--){var p3=D.parts[i];if(p3._seg&&segd(pt[0],pt[1],p3._seg[0][0],p3._seg[0][1],p3._seg[1][0],p3._seg[1][1])<9){selPart=p3;if(!p3.locked)drag={t:'pmove',p:p3,g0:[(pt[0]-OX)/PITCH+1,(pt[1]-OY)/PITCH+1],orig:partLeads(p3).map(function(L){return deep(L.pos);})};render();return;}}
selPart=null;render();});
svg.addEventListener('pointermove',function(ev){if(drag)return;var pt=getPt(ev),h=nearHole(pt[0],pt[1]);
var sp=document.getElementById('st-pos'),sn=document.getElementById('st-net');
if(!h){sp.textContent='—';sn.textContent='';return;}
sp.innerHTML='列 <b>'+h[0]+'</b> 行 <b>'+String.fromCharCode(64+h[1])+'</b>';
var lm=leadMap(),o=lm[key(h)],e2=endAt(h[0],h[1]);
if(o)sn.innerHTML='ネット: <b>'+o.net+'</b>（'+o.name+'）';
else if(e2)sn.innerHTML='銅線端子: <b>'+e2.w.net+'</b>';
else if(blockedIdx(h[0],h[1])>=0)sn.innerHTML='<span style="color:var(--wr)">ブロック穴</span>';
else sn.textContent='空き穴';});
window.addEventListener('pointermove',function(ev){if(!drag)return;var pt=getPt(ev),g=[(pt[0]-OX)/PITCH+1,(pt[1]-OY)/PITCH+1];
if(drag.t==='bridge'){drag.cur=pt;}
else if(drag.t==='end'){drag.e.direct=false;drag.e.hole=[g[0],g[1]];}
else if(drag.t==='plead'){drag.L.set([g[0],g[1]]);}
else if(drag.t==='pmove'){var dx=g[0]-drag.g0[0],dy=g[1]-drag.g0[1],Ls=partLeads(drag.p);for(var i=0;i<Ls.length;i++)Ls[i].set([drag.orig[i][0]+dx,drag.orig[i][1]+dy]);}
render();});
window.addEventListener('pointerup',function(ev){if(!drag)return;var pt=getPt(ev),h=nearHole(pt[0],pt[1]);
if(drag.t==='bridge'){if(h&&adj(h,drag.a)){snap();D.padBridges.push([drag.a,h]);}drag=null;render();return;}
if(drag.t==='end'){var e=drag.e,w=drag.w;
function rev(){e.hole=drag.prev.hole;e.direct=drag.prev.direct;e.bridgeTo=drag.prev.bridgeTo;}
if(!h){rev();}
else if(h[0]===e.pad[0]&&h[1]===e.pad[1]){snap();e.hole=deep(e.pad);e.direct=true;e.bridgeTo=null;}
else if(blockedIdx(h[0],h[1])>=0||occupiedOther(h[0],h[1],null,e)){rev();}
else{snap();e.hole=[h[0],h[1]];e.direct=false;revalidate(e,w);}
drag=null;render();return;}
if(drag.t==='plead'){var L=drag.L,p=drag.p;
if(!h||blockedIdx(h[0],h[1])>=0||occupiedOther(h[0],h[1],p,null)){L.set(drag.prev);}
else{var dup=false;partLeads(p).forEach(function(L2){if(L2!==L&&L2.pos[0]===h[0]&&L2.pos[1]===h[1])dup=true;});
if(dup)L.set(drag.prev);else{snap();L.set([h[0],h[1]]);afterMove(p);}}
drag=null;render();return;}
if(drag.t==='pmove'){var p2=drag.p,Ls=partLeads(p2),dx=Math.round((pt[0]-OX)/PITCH+1-drag.g0[0]),dy=Math.round((pt[1]-OY)/PITCH+1-drag.g0[1]),ok=true,i;
var np=[];for(i=0;i<Ls.length;i++){var q=[drag.orig[i][0]+dx,drag.orig[i][1]+dy];np.push(q);if(!inb(q[0],q[1])||blockedIdx(q[0],q[1])>=0||occupiedOther(q[0],q[1],p2,null))ok=false;}
for(i=0;i<Ls.length;i++)Ls[i].set(ok?np[i]:drag.orig[i]);
if(ok){snap();afterMove(p2);}
drag=null;render();return;}});
function exportJSON(){return JSON.stringify({proposal:props[curI].name,grid:D.grid,blockedHoles:D.blockedHoles,leads:D.leads,parts:D.parts,padBridges:D.padBridges,wires:D.wires,netColors:D.netColors,cfg:CFG},function(k,v){return (typeof k==='string'&&k.charAt(0)==='_')?undefined:v;});}
function importObj(d2){snap();['grid','blockedHoles','leads','parts','padBridges','wires','netColors'].forEach(function(k){if(d2[k])D[k]=d2[k];});
if(d2.proposals){props=d2.proposals.map(function(p){return{name:p.name,orig:p.state,cur:null};});curI=0;refreshSel();loadProp(0);auditNow();return;}
if(d2.cfg&&d2.cfg.weights&&d2.cfg.physical)CFG=d2.cfg;
cols=D.grid.cols;rows=D.grid.rows;buildSliders();refreshSel();render();auditNow();}
function saveLS(){try{var st={curI:curI,cfg:CFG,names:props.map(function(p){return p.name;}),states:props.map(function(p){return p.cur;})};localStorage.setItem(LSKEY,JSON.stringify(st,function(k,v){return (typeof k==='string'&&k.charAt(0)==='_')?undefined:v;}));}catch(e){}}
function loadLS(){try{var st=JSON.parse(localStorage.getItem(LSKEY));if(!st)return;
if(st.cfg&&st.cfg.weights&&st.cfg.physical&&st.cfg.classes&&st.cfg.partOv&&st.cfg.rules)CFG=st.cfg;
if(st.states)st.states.forEach(function(s,i){if(s){if(!props[i])props[i]={name:(st.names&&st.names[i])||('案'+i),orig:s,cur:null};props[i].cur=s;if(st.names&&st.names[i])props[i].name=st.names[i];}});
if(typeof st.curI==='number'&&props[st.curI])curI=st.curI;}catch(e){}}
function refreshSel(){var sel=document.getElementById('pw-prop');sel.innerHTML='';props.forEach(function(p,i){var o=document.createElement('option');o.value=i;o.textContent=p.name;sel.appendChild(o);});sel.value=curI;}
function setMode(m){mode=m;['end','part','bridge','block'].forEach(function(k){document.getElementById('m-'+k).className=(k===m)?'on':'';});
document.getElementById('modehint').textContent=HINT[m];render();}
document.getElementById('m-end').onclick=function(){setMode('end');};
document.getElementById('m-part').onclick=function(){setMode('part');};
document.getElementById('m-bridge').onclick=function(){setMode('bridge');};
document.getElementById('m-block').onclick=function(){setMode('block');};
document.getElementById('pw-lock').onclick=function(){if(selPart){snap();selPart.locked=!selPart.locked;render();}};
document.getElementById('pw-reset').onclick=function(){snap();props[curI].cur=deep(props[curI].orig);loadProp(curI);auditNow();};
document.getElementById('pw-prop').onchange=function(){loadProp(parseInt(this.value,10));auditNow();};
document.getElementById('pw-undo').onclick=undo;
document.getElementById('pw-rewire').onclick=function(){snap();connect();render();auditNow();};
document.getElementById('pw-repropose').onclick=function(){snap();propose();render();auditNow();};
document.getElementById('pw-saveas').onclick=function(){props.push({name:'案 '+new Date().toLocaleTimeString(),orig:deep(D),cur:deep(D)});curI=props.length-1;refreshSel();loadProp(curI);};
document.getElementById('pw-defcfg').onclick=function(){CFG=deep(DEFCFG);buildSliders();saveLS();};
document.getElementById('pw-copy').onclick=function(){var b=this;document.getElementById('pw-out').value=exportJSON();if(navigator.clipboard)navigator.clipboard.writeText(exportJSON()).then(function(){b.textContent='コピー済み';setTimeout(function(){b.textContent='コピー';},1400);});};
document.getElementById('pw-export').onclick=function(){var j=exportJSON();document.getElementById('pw-out').value=j;if(navigator.clipboard)navigator.clipboard.writeText(j);var bl=new Blob([j],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(bl);a.download='perfwire_export.json';a.click();};
document.getElementById('pw-import').onclick=function(){try{importObj(JSON.parse(document.getElementById('pw-out').value));}catch(e2){alert('JSONが不正です: '+e2.message);}};
document.getElementById('pw-sample').onclick=function(){props=INIT.proposals.map(function(p){return{name:p.name,orig:p.state,cur:null};});curI=0;refreshSel();loadProp(0);auditNow();};
document.getElementById('pw-clearls').onclick=function(){try{localStorage.removeItem(LSKEY);}catch(e){}location.reload();};
document.getElementById('pw-open').onclick=function(){document.getElementById('pw-file').click();};
document.getElementById('pw-file').onchange=function(){var f=this.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(){try{importObj(JSON.parse(rd.result));}catch(e2){alert('JSONが不正です: '+e2.message);}};rd.readAsText(f);};
window.addEventListener('dragover',function(e){e.preventDefault();document.body.classList.add('drop');});
window.addEventListener('dragleave',function(e){document.body.classList.remove('drop');});
window.addEventListener('drop',function(e){e.preventDefault();document.body.classList.remove('drop');var f=e.dataTransfer.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(){try{importObj(JSON.parse(rd.result));}catch(e2){alert('JSONが不正です: '+e2.message);}};rd.readAsText(f);});
document.getElementById('z-in').onclick=function(){ZOOM=Math.min(2.2,ZOOM*1.2);render();};
document.getElementById('z-out').onclick=function(){ZOOM=Math.max(0.5,ZOOM/1.2);render();};
document.getElementById('z-fit').onclick=function(){ZOOM=1;render();};
window.addEventListener('keydown',function(e){var tag=(e.target.tagName||'').toLowerCase();if(tag==='input'||tag==='textarea'||tag==='select')return;
if(e.ctrlKey&&e.key.toLowerCase()==='z'){e.preventDefault();undo();return;}
if(e.key==='1')setMode('end');if(e.key==='2')setMode('part');if(e.key==='3')setMode('bridge');if(e.key==='4')setMode('block');});
function auditNow(){try{audit();}catch(e){document.getElementById('audit').textContent='監査エラー: '+e.message;}}
function tgl(box,label,k){var d=document.createElement('label');d.className='tgl';
var i=document.createElement('input');i.type='checkbox';i.checked=LY[k];
i.onchange=function(){LY[k]=i.checked;render();};
d.appendChild(i);d.appendChild(document.createTextNode(label));box.appendChild(d);}
(function(){var b=document.getElementById('layers');
[['部品','parts'],['ラベル','labels'],['被覆線','wires'],['ブリッジ','bridges'],['端子','ends'],['注意×','caut'],['ブロック穴','blocked']].forEach(function(x){tgl(b,x[0],x[1]);});})();
function slider(box,label,get,set,min,max,step){var lab=document.createElement('div');lab.className='sld';
var l=document.createElement('span');l.className='lab';l.textContent=label;
var i=document.createElement('input');i.type='range';i.min=min;i.max=max;i.step=step;i.value=get();
var v=document.createElement('span');v.className='val';v.textContent=get();
i.oninput=function(){set(parseFloat(i.value));v.textContent=i.value;saveLS();};
lab.appendChild(l);lab.appendChild(i);lab.appendChild(v);box.appendChild(lab);}
function checkbox2(box,label,get,set){var d=document.createElement('label');d.className='tgl';
var i=document.createElement('input');i.type='checkbox';i.checked=get();
i.onchange=function(){set(i.checked);saveLS();};
d.appendChild(i);d.appendChild(document.createTextNode(label));box.appendChild(d);}

w.innerHTML='';ph.innerHTML='';ee.innerHTML='';
slider(w,'ブリッジ優先（銅線削減）',function(){return CFG.weights.bridgeBonus;},function(v){CFG.weights.bridgeBonus=v;},0,40,1);
slider(w,'配線長の重み',function(){return CFG.weights.wireLen;},function(v){CFG.weights.wireLen=v;},0,3,0.1);

slider(ph,'抵抗 曲げ代 mm',function(){return CFG.physical.r.bend;},function(v){CFG.physical.r.bend=v;},0,2,0.1);

slider(ee,'デカップリング距離上限（穴）',function(){return CFG.decoupling.length?CFG.decoupling[0].max:2;},function(v){CFG.decoupling.forEach(function(d,i){if(i<2)d.max=v;});},1,5,1);
slider(ee,'入出力分離距離（穴）',function(){return CFG.classes.HIZ.keepHoles;},function(v){CFG.classes.HIZ.keepHoles=v;CFG.classes.OUT.keepHoles=v;},0,4,1);
slider(ee,'パッド接合数上限',function(){return CFG.rules.maxJoints;},function(v){CFG.rules.maxJoints=v;},2,5,1);}
loadLS();

refreshSel();
setMode('end');
loadProp(curI);
auditNow();
})();
