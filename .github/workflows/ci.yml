name: ci

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: JS parse gate + embedded INIT validation (index.html)
        run: node tools/extract_check.mjs

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python solver smoke test (all sample proposals)
        run: python tools/ci_smoke.py
